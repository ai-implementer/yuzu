# GitHub Pages へのデプロイ（yuzu build → Pages artifact）。
# 事前準備: リポジトリの Settings > Pages > Source を「GitHub Actions」にする。
# actions はフルコミット SHA でピン留めする（タグの書き換えによる改ざんを防ぐ）。
# 更新時は SHA とコメントのバージョンを揃えること
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # SHA ピンでは ref 名からツールチェインを推定できないため toolchain の明示が必須
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: yuzu をインストール
        # fork や特定バージョンを使う場合はこの URL / ref を差し替える
        run: cargo install --git https://github.com/ai-implementer/yuzu yuzu-cli

      - name: Pages の設定を取得
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: ビルド
        # base_path は user/org pages なら空・project pages なら /<リポジトリ名>。
        # --base-url は yuzu.jsonc の baseUrl 設定より優先される
        run: yuzu build --base-url "${{ steps.pages.outputs.base_path }}/"

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
