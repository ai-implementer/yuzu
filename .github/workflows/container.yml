name: Container

# 開発コンテナ（.devcontainer/Dockerfile）の定義が腐っていないかの検知だけを行う。
# テストは回さない（コードの検証は ci.yml の責務）。
# runner は Docker だが、Dockerfile は apple container（scripts/dev-container.sh）と
# 共有なので、ここが通ればイメージ定義自体の妥当性は両経路で担保される
on:
  push:
    branches: [main]
    paths: [".devcontainer/**", ".github/workflows/container.yml"]
  pull_request:
    paths: [".devcontainer/**", ".github/workflows/container.yml"]

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      # actions はフルコミット SHA でピン留めする（タグの書き換えによる改ざんを防ぐ）。
      # 更新時は SHA とコメントのバージョンを揃えること
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: build
        run: docker build -t yuzu-dev -f .devcontainer/Dockerfile .devcontainer

      # ツール一式が期待どおり入っているか（.devcontainer/README.md の不変条件に対応）
      - name: verify toolchain
        run: |
          docker run --rm yuzu-dev bash -lc '
            set -eux
            test "$(whoami)" = vscode
            test "$(pwd)" = /workspaces/yuzu
            test "$CARGO_TARGET_DIR" = /cargo-target
            rustc -V
            cargo fmt --version
            cargo clippy --version
            cargo insta --version
            rustup target list --installed | grep -q wasm32-unknown-unknown
          '

      # post-create.sh の冪等性（コンテナ内で 2 回実行しても失敗しない）
      - name: post-create idempotency
        run: |
          docker run --rm -v "$PWD:/workspaces/yuzu" yuzu-dev bash -lc '
            bash .devcontainer/post-create.sh
            bash .devcontainer/post-create.sh
          '
