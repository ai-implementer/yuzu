name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # insta: CI ではスナップショット未承認を必ず失敗にする
  INSTA_UPDATE: "no"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # actions はフルコミット SHA でピン留めする（タグの書き換えによる改ざんを防ぐ）。
      # 更新時は SHA とコメントのバージョンを揃えること
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # SHA ピンでは ref 名からツールチェインを推定できないため toolchain の明示が必須
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: fmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

      - name: build
        run: cargo build --workspace

      # wasm32 でのコンパイル可能性を確認する
      # - yuzu-search-wasm: 成果物は scripts/build-search-wasm.sh で vendor 済み
      # - tankan: wasm ターゲットの担保（M5。I/O・時刻・乱数非依存を維持する）
      - name: wasm check
        run: |
          rustup target add wasm32-unknown-unknown
          cargo check -p yuzu-search-wasm --target wasm32-unknown-unknown
          cargo check -p tankan --target wasm32-unknown-unknown

      # e2e: サンプルプロジェクト生成 → ビルド → ネイティブ検索（誤字クエリ込み）
      - name: e2e (yuzu new && yuzu build && yuzu search)
        run: |
          ./target/debug/yuzu new "$RUNNER_TEMP/e2e-docs"
          cd "$RUNNER_TEMP/e2e-docs"
          "$GITHUB_WORKSPACE/target/debug/yuzu" build
          test -f dist/index.html
          test -f dist/guide/getting-started/index.html
          test -f dist/_search/manifest.json
          test -f dist/_search/search_bg.wasm
          "$GITHUB_WORKSPACE/target/debug/yuzu" search "はじめに" | grep "はじめに"
          "$GITHUB_WORKSPACE/target/debug/yuzu" search "ダーくモード" | grep -q "."
          # Phase 6: fmt/lint/check（正常系 = 0、違反注入で = 1 の終了コード契約）
          "$GITHUB_WORKSPACE/target/debug/yuzu" fmt --check
          "$GITHUB_WORKSPACE/target/debug/yuzu" lint
          "$GITHUB_WORKSPACE/target/debug/yuzu" check
          echo '[壊れリンク](missing.md)' >> content/index.md
          if "$GITHUB_WORKSPACE/target/debug/yuzu" check; then
            echo "check が壊れリンクを検出しなかった" >&2
            exit 1
          fi
