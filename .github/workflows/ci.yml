name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # insta: CI ではスナップショット未承認を必ず失敗にする
  INSTA_UPDATE: "no"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # actions はフルコミット SHA でピン留めする（タグの書き換えによる改ざんを防ぐ）。
      # 更新時は SHA とコメントのバージョンを揃えること
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # SHA ピンでは ref 名からツールチェインを推定できないため toolchain の明示が必須
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: fmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

      - name: build
        run: cargo build --workspace

      # crates.io 公開対象（tankan）のパッケージ検証。メタデータ・同梱内容の
      # 回帰を PR で検出する。実公開は手動 cargo publish（CLAUDE.md「リリース手順」）
      - name: package (tankan)
        run: cargo package --locked -p tankan

      # wasm32 でのコンパイル可能性を確認する
      # - yuzu-search-wasm: 成果物は scripts/build-search-wasm.sh で vendor 済み
      # - tankan: wasm ターゲットの担保（M5。I/O・時刻・乱数非依存を維持する）
      - name: wasm check
        run: |
          rustup target add wasm32-unknown-unknown
          cargo check -p yuzu-search-wasm --target wasm32-unknown-unknown
          cargo check -p tankan --target wasm32-unknown-unknown

      # docs/: yuzu 自身のドキュメントサイト（Phase 36）を PR でも検証する。
      # デプロイは docs.yml（main push）だが、壊れた原稿・SSR フォールバックの
      # 混入はマージ前にここで検出する
      - name: docs site (yuzu check && yuzu build)
        run: |
          cd docs
          "$GITHUB_WORKSPACE/target/debug/yuzu" check
          "$GITHUB_WORKSPACE/target/debug/yuzu" build
          test -f dist/index.html
          test -f dist/_search/manifest.json
          # mermaid backend: ssr のサイトなので、フォールバック（= mermaid.js の
          # script タグ）が出たら tankan の回帰として失敗させる
          # （本文中の文字列と区別するため src 属性の形で照合する）
          if grep -rlE 'src="[^"]*vendor/mermaid\.min\.js"' dist/ --include="*.html"; then
            echo "docs で SSR フォールバックが発生している（上記ページ）" >&2
            exit 1
          fi

      # e2e: サンプルプロジェクト生成 → ビルド → ネイティブ検索（誤字クエリ込み）
      - name: e2e (yuzu new && yuzu build && yuzu search)
        run: |
          ./target/debug/yuzu new "$RUNNER_TEMP/e2e-docs"
          cd "$RUNNER_TEMP/e2e-docs"
          test -f .github/workflows/deploy.yml
          "$GITHUB_WORKSPACE/target/debug/yuzu" build
          test -f dist/index.html
          test -f dist/guide/getting-started/index.html
          test -f dist/_search/manifest.json
          test -f dist/_search/search_bg.wasm
          # --base-url は設定より優先して配信パスを差し替える（deploy.yml が使う契約）
          "$GITHUB_WORKSPACE/target/debug/yuzu" build --base-url /docs/
          grep -q '/docs/_assets/' dist/index.html
          "$GITHUB_WORKSPACE/target/debug/yuzu" search "はじめに" | grep "はじめに"
          # タイポトレランスの実ヒット確認（Phase 21: 出力の有無だけでは日本語 typo の
          # 不具合を見逃した反省から、ヒット内容まで検証する）
          "$GITHUB_WORKSPACE/target/debug/yuzu" search "ダーくモード" | grep -q "ダークモード"
          # フレーズ検索（Phase 31）: 隣接一致でヒットし、逆順は 0 件
          "$GITHUB_WORKSPACE/target/debug/yuzu" search '"ライブリロード"' | grep -q "ライブリロード"
          "$GITHUB_WORKSPACE/target/debug/yuzu" search '"リロードライブ"' | grep -q "一致するページはありませんでした"
          # Phase 6: fmt/lint/check（正常系 = 0、違反注入で = 1 の終了コード契約）
          "$GITHUB_WORKSPACE/target/debug/yuzu" fmt --check
          "$GITHUB_WORKSPACE/target/debug/yuzu" lint
          "$GITHUB_WORKSPACE/target/debug/yuzu" check
          # Phase 22: openapi/jsonschema SSR — scaffold の jsonschema ブロックが
          # 静的 HTML 化されていること＋ file: 参照は仕様ファイルの変更だけで反映されること
          # （jsonschema は class="api-spec api-schema" なので閉じ引用符まで書かない）
          grep -q 'class="api-spec' dist/guide/getting-started/index.html
          mkdir -p specs
          printf 'openapi: 3.0.3\ninfo:\n  title: E2E API v1\n  version: 1.0.0\npaths: {}\n' > specs/api.yaml
          printf -- '---\ntitle: API\n---\n\n# API\n\n```openapi\nfile: specs/api.yaml\n```\n' > content/api.md
          "$GITHUB_WORKSPACE/target/debug/yuzu" build
          grep -q 'E2E API v1' dist/api/index.html
          printf 'openapi: 3.0.3\ninfo:\n  title: E2E API v2\n  version: 1.0.0\npaths: {}\n' > specs/api.yaml
          "$GITHUB_WORKSPACE/target/debug/yuzu" build
          grep -q 'E2E API v2' dist/api/index.html
          # content 同伴アセット: ページ横の画像が dist へコピーされ src が解決される
          printf 'PNG-E2E' > content/guide/pic.png
          printf -- '\n![図](pic.png)\n' >> content/guide/getting-started.md
          "$GITHUB_WORKSPACE/target/debug/yuzu" build
          test -f dist/guide/pic.png
          grep -q 'src="/guide/pic.png"' dist/guide/getting-started/index.html
          "$GITHUB_WORKSPACE/target/debug/yuzu" check
          echo '[壊れリンク](missing.md)' >> content/index.md
          if "$GITHUB_WORKSPACE/target/debug/yuzu" check; then
            echo "check が壊れリンクを検出しなかった" >&2
            exit 1
          fi
